name: ovg_billing
description: Om Vinayaka Garments - Billing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # HTTP & API
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # PDF & Sharing
  pdf: ^3.10.8
  printing: ^5.14.3
  share_plus: ^7.2.1
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  
  # Utils
  url_launcher: ^6.2.3
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  record: ^6.2.0
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
